<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bricks - Space Defense</title>
    
    <link rel="stylesheet" href="styles/style.css"> 
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div class="game-container">
        <h1>Neon Bricks</h1>
        
        <div class="stats">
            <p>Score: <mark id="score">0</mark></p>
            <p>Time: <mark id="time">00:00</mark></p>
            <p>Level: <mark id="current-level">1</mark></p>
        </div>

        <div class="legend">
            <span class="brick-badge badge-hp1">1 HP (Red)</span>
            <span class="brick-badge badge-hp2">2 HP (Blue)</span>
            <span class="brick-badge badge-hp3">3 HP (Green)</span>
        </div>

        <div class="level-controls">
            <button id="btn-lvl1" onclick="startLevel(1)">Level 1</button>
            <button id="btn-lvl2" onclick="startLevel(2)" disabled>Level 2 (Need 5 Pts)</button>
            <button id="btn-lvl3" onclick="startLevel(3)" disabled>Level 3 (Need 10 Pts)</button>
        </div>

        <canvas id="canvas" width="500" height="400"></canvas>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
