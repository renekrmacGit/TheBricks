<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bricks Game - Advanced</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div class="game-container">
        <h1>The Bricks</h1>
        
        <div class="stats">
            <p>Score: <mark id="tocke">0</mark></p>
            <p>Time: <mark id="cas">00:00</mark></p>
            <p>Level: <mark id="current-level">1</mark></p>
        </div>

        <div class="legend">
            <span class="brick-badge badge-blue">Blue: 1 HP</span>
            <span class="brick-badge badge-red">Red: 2 HP</span>
            <span class="brick-badge badge-black">Black: 3 HP</span>
        </div>

        <div class="level-controls">
            <button id="btn-lvl1" onclick="startLevel(1)">Level 1</button>
            <button id="btn-lvl2" onclick="startLevel(2)" disabled>Level 2 (Need 5 Pts on Lvl 1)</button>
            <button id="btn-lvl3" onclick="startLevel(3)" disabled>Level 3 (Need 10 Pts on Lvl 2)</button>
        </div>

        <canvas id="canvas" width="500" height="400"></canvas>
    </div>

    <script src="script.js"></script>

</body>
</html>
